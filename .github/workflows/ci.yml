name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SKILLS_EMBEDDING_PROVIDER: deterministic

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Lint markdown
        run: npx --yes markdownlint-cli2 "**/*.md"

  ruff:
    name: ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff check
        run: python3 -m ruff check scripts tests

      - name: Ruff format
        run: python3 -m ruff format --check scripts tests

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Mypy
        run: python3 -m mypy

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Quality-tier tests
        run: |
          python3 -m pytest -q -n 2 --cov=scripts --cov-report=term \
            -m "not live_neo4j and not slow and not eval_pr"

      - name: Offline KG/MCP smoke
        run: |
          python3 scripts/graph/build/embed_skill_chunks.py --query "approval before destructive command" --limit 1 >/dev/null
          python3 scripts/lib/retrieval/retrieve_skills_hybrid.py "graph rag ontology retrieval" --limit 1 >/dev/null
          python3 scripts/runtime/mcp/skills_mcp_server.py --list-tools >/dev/null

  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      # Skip local-only / auto-fix hooks: no-commit-to-branch fails on push-to-main;
      # whitespace/ruff fixers and trust gate are covered by dedicated jobs or local commits.
      - name: Pre-commit fast hooks (commit stage, check-only)
        run: >-
          SKIP=trailing-whitespace,end-of-file-fixer,ruff,ruff-format,no-commit-to-branch,validate-skill-trust
          python3 -m pre_commit run --all-files --hook-stage pre-commit --show-diff-on-failure

  library-validators:
    name: Library validators
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Library validators
        run: ./scripts/dev_workflow/run_library_validators.sh --all

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: skills-ui/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install pip-audit
          npm --prefix skills-ui ci

      - name: pip-audit (Python)
        run: pip-audit

      - name: npm audit (skills-ui)
        run: npm --prefix skills-ui audit --audit-level=high

  ingest-gate:
    name: Ingest gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pytest, library-validators, pre-commit, gitleaks, dependency-audit]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: CI ingest gate
        env:
          DELTA_EVAL_BASE_REF: ${{ github.event.pull_request.base.sha || format('origin/{0}', github.event.repository.default_branch || 'main') }}
        run: python3 scripts/utils/ci/ci_ingest_gate.py

  eval-pr:
    name: PR retrieval eval
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [pytest]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Realistic and abstention tiers
        run: python3 -m pytest -m eval_pr -q

  skills-ui:
    name: Skills UI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pytest]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: skills-ui/package-lock.json

      - name: Skills UI checks
        run: |
          npm --prefix skills-ui ci
          npm --prefix skills-ui test
          npm --prefix skills-ui run lint
          npm --prefix skills-ui run build

  neo4j-integration:
    name: Neo4j integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [pytest, pre-commit, gitleaks]
    services:
      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_server_memory_heap_initial__size: 512m
          NEO4J_server_memory_heap_max__size: 1G
          NEO4J_server_memory_pagecache_size: 512m
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 24
          --health-start-period 20s
    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      NEO4J_DATABASE: neo4j
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Live Neo4j integration tests
        run: python3 -m pytest tests/test_live_neo4j_integration.py -q
