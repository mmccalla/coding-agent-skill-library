name: Validate skills library

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_server_memory_heap_initial__size: 512m
          NEO4J_server_memory_heap_max__size: 1G
          NEO4J_server_memory_pagecache_size: 512m
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 24
          --health-start-period 20s
    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      NEO4J_DATABASE: neo4j
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630cea73d8afb0186dc0d8ca0 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@8d9ed9acfe707f195d7998e90d1a2fb01bfe5ab8 # v5.3.0
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: skills-ui/package-lock.json

      - name: Install project dependencies
        run: python -m pip install -e ".[dev]"

      - name: Validate skill structure
        run: ./scripts/ci_local.sh

      - name: Report live Neo4j readiness
        run: python scripts/check_neo4j_readiness.py --json
