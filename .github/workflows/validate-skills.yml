name: Validate skills library

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Production uses BGE-M3; PR CI stays deterministic and offline.
  SKILLS_EMBEDDING_PROVIDER: deterministic

jobs:
  validators:
    name: Validators
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project dependencies
        run: python -m pip install -e ".[dev]"

      - name: Library validators
        run: |
          python3 scripts/validate_docs.py
          python3 scripts/validate_skills.py
          python3 scripts/validate_skills_graph.py
          python3 scripts/validate_eval_corpus.py --check-skill-sync

      - name: Ruff check
        run: python3 -m ruff check scripts tests

      - name: Ruff format
        run: python3 -m ruff format --check scripts tests

      - name: Mypy
        run: python3 -m mypy

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project dependencies
        run: python -m pip install -e ".[dev]"

      - name: Unit and integration tests
        run: |
          python3 -m pytest --cov=scripts --cov-report=term-missing \
            -m "not live_neo4j and not slow and not eval_pr"

      - name: Offline KG/MCP smoke
        run: |
          python3 scripts/embed_skill_chunks.py --query "approval before destructive command" --limit 1 >/dev/null
          python3 scripts/retrieve_skills_hybrid.py "graph rag ontology retrieval" --limit 1 >/dev/null
          python3 scripts/skills_mcp_server.py --list-tools >/dev/null

      - name: Skill count
        run: |
          count="$(find skills -name 'SKILL.md' | wc -l | tr -d ' ')"
          if [ "$count" -lt 1 ]; then
            echo "expected at least one SKILL.md file, found $count" >&2
            exit 1
          fi
          echo "discovered $count SKILL.md files"

  ingest-gate:
    name: Ingest gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validators
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project dependencies
        run: python -m pip install -e ".[dev]"

      - name: CI ingest gate
        env:
          DELTA_EVAL_BASE_REF: ${{ github.event.pull_request.base.sha || format('origin/{0}', github.event.repository.default_branch || 'main') }}
        run: python3 scripts/ci_ingest_gate.py

  eval-pr:
    name: PR retrieval eval
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project dependencies
        run: python -m pip install -e ".[dev]"

      - name: Realistic and abstention tiers
        run: python3 -m pytest -m eval_pr -q

  skills-ui:
    name: Skills UI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: skills-ui/package-lock.json

      - name: Skills UI checks
        run: |
          npm --prefix skills-ui ci
          npm --prefix skills-ui test
          npm --prefix skills-ui run lint
          npm --prefix skills-ui run build

  neo4j-integration:
    name: Neo4j integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_server_memory_heap_initial__size: 512m
          NEO4J_server_memory_heap_max__size: 1G
          NEO4J_server_memory_pagecache_size: 512m
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 24
          --health-start-period 20s
    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      NEO4J_DATABASE: neo4j
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project dependencies
        run: python -m pip install -e ".[dev]"

      - name: Bounded fixture load, readiness, and idempotent reload
        run: python3 -m pytest tests/test_live_neo4j_integration.py -q
