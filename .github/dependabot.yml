version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      python-runtime:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /skills-ui
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    # typescript-eslint@8.x peers typescript ">=4.8.4 <6.1.0" — TS 7 installs fail (ERESOLVE).
    ignore:
      - dependency-name: typescript
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
